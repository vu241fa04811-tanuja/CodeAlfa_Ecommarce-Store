<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopEase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">ShopEase</div>
</nav>

<div class="checkout-container">

    <h1>Login</h1>

    <form id="loginForm">

        <input type="email"
               id="loginEmail"
               placeholder="Email"
               required>

        <input type="password"
               id="loginPassword"
               placeholder="Password"
               required>

        <button type="submit"
                class="checkout-btn">
            Login
        </button>

    </form>

</div>

<script src="login.js"></script>

</body>
</html>
